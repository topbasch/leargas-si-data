name: Update ENTSO-E Grid Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch ENTSO-E data
        run: python fetch_entsoe.py

      - name: Commit and push
        run: |
          git config user.name "TOPBASCH Data Bot"
          git config user.email "topbas.ahmetselahaddin@gmail.com"
          git add data/grid_data.json
          git diff --staged --quiet || git commit -m "Update grid data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
